<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cybersecurity Vulnerability Tracker - {% block title %}{% endblock %} </title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f12;
      --surface:   #13161e;
      --border:    #1e2330;
      --accent:    #e84545;
      --accent2:   #f5a623;
      --green:     #2ecc71;
      --blue:      #4a9eff;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --critical:  #e84545;
      --high:      #f5a623;
      --medium:    #4a9eff;
      --low:       #2ecc71;
      }
body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
    }
    /*Sidebar */
    nav {
      width: 220px;
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0;
      flex-shrink: 0;
    }
    .nav-brand {
      padding: 28px 24px 24px;
      border-bottom: 1px solid var(--border);
    }
    .nav-brand span {
      font-family: 'Times New Roman', TimesNewRoman;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    .nav-brand small {
      display: block;
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 2px;
      font-family: 'Times New Roman', TimesNewRoman;
    }
    .nav-links { padding: 16px 0; flex: 1; }
    .nav-links a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.15s;
      border-left: 3px solid transparent;
    }
    .nav-links a:hover,
    .nav-links a.active {
      color: var(--text);
      background: rgba(232,69,69,0.07);
      border-left-color: var(--accent);
    }
    .nav-links .icon { font-size: 1rem; width: 18px; text-align: center; }

    /*Main area*/
    main { flex: 1; padding: 36px 40px; overflow-y: auto; }

    h1 {
      font-family: 'Space Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }
    .page-sub { color: var(--muted); font-size: 0.875rem; margin-bottom: 32px; }

    /*Flash messages*/
    .flash { padding: 12px 16px; border-radius: 6px; margin-bottom: 20px; font-size: 0.875rem; }
    .flash.success { background: rgba(46,204,113,0.12); border: 1px solid rgba(46,204,113,0.3); color: var(--green); }
    .flash.error   { background: rgba(232,69,69,0.12);  border: 1px solid rgba(232,69,69,0.3);  color: var(--accent); }

    /*Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
    }
    /*Stat grid*/
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 22px;
    }
    .stat-card .label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .stat-card .value { font-family: 'Space Mono', monospace; font-size: 2rem; font-weight: 700; }
    .stat-card.red .value    { color: var(--accent); }
    .stat-card.orange .value { color: var(--accent2); }
    .stat-card.blue .value   { color: var(--blue); }
    .stat-card.green .value  { color: var(--green); }

    /*Table*/
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead th {
      text-align: left; padding: 10px 14px;
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); border-bottom: 1px solid var(--border);
      font-family: 'Space Mono', monospace;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    tbody td { padding: 12px 14px; vertical-align: middle; }

    /*Badges*/
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .badge-Critical    {background: rgba(232,69,69,0.15);  color: var(--critical);}
    .badge-High        {background: rgba(245,166,35,0.15); color: var(--high);}
    .badge-Medium      {background: rgba(74,158,255,0.15); color: var(--blue);}
    .badge-Low         {background: rgba(46,204,113,0.15); color: var(--green);}
    .badge-Open        {background: rgba(232,69,69,0.12);  color: var(--accent);}
    .badge-In-Progress {background: rgba(245,166,35,0.12); color: var(--accent2);}
    .badge-Resolved    {background: rgba(46,204,113,0.12); color: var(--green);}
    .badge-Production  {background: rgba(232,69,69,0.12);  color: var(--accent);}
    .badge-Staging     {background: rgba(245,166,35,0.12); color: var(--accent2);}
    .badge-Development {background: rgba(74,158,255,0.12); color: var(--blue);}

    /*Buttons*/
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: 6px; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; border: none; text-decoration: none;
      transition: all 0.15s; font-family: 'DM Sans', sans-serif;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #cf3333; }
    .btn-ghost { background: transparent; color: #4a9eff; border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
    .btn-danger { background: rgba(232,69,69,0.12); color: var(--accent); border: 1px solid rgba(232,69,69,0.25); }
    .btn-danger:hover { background: var(--accent); color: #fff; }
    .btn-sm { padding: 5px 12px; font-size: 0.78rem; }

    /*Forms*/
    .form-group { margin-bottom: 20px; }
    label {
      display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 7px;
    }
    input[type=text], input[type=date], select {
      width: 100%; padding: 10px 14px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 6px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; transition: border 0.15s;
    }
    input[type=text]:focus, input[type=date]:focus, select:focus {
      outline: none; border-color: var(--accent);
    }
    select option { background: var(--surface); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    .section-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
    }
    .section-title { font-family: 'Space Mono', monospace; font-size: 0.9rem; color: var(--muted); }
  </style>
</head>
<body>

<nav>
    <div class="nav-brand">
        <span>Vulnerability Tracker</span>
        <small> ASU CSE 412 Phase 03</small>
    </div>
    <div class="nav-links">
        <a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">
            Dashboard
        </a>
        <a href="{{ url_for('assets') }}" class="{% if 'asset' in request.endpoint %}active{% endif %}">
            Assets
        </a>
        <a href="{{ url_for('findings') }}" class="{% if 'finding' in request.endpoint %}active{% endif %}">
            Findings
        </a>
    </div>
</nav>

<main>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
    <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
