{% extends "base.html" %}
{% block title %}Add Asset{% endblock %}

{% block content %}
<h1>Add Asset</h1>
<p class="page-sub">Insert a new asset record into the database</p>

<div class="card" style="max-width: 620px;">
  <form method="POST" action="{{ url_for('add_asset') }}">

    <div class="form-row">
      <div class="form-group">
        <label for="hostname">Hostname</label>
        <input type="text" id="hostname" name="hostname" placeholder="e.g. web-server-02" required />
      </div>
      <div class="form-group">
        <label for="ipaddress">IP Address</label>
        <input type="text" id="ipaddress" name="ipaddress" placeholder="e.g. 192.168.1.50" required />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="operatingsystem">Operating System</label>
        <input type="text" id="operatingsystem" name="operatingsystem" placeholder="e.g. Ubuntu 22.04" required />
      </div>
      <div class="form-group">
        <label for="environment">Environment</label>
        <select id="environment" name="environment" required>
          <option value="" disabled selected>Select environment</option>
          <option value="Production">Production</option>
          <option value="Staging">Staging</option>
          <option value="Development">Development</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="owneruserid">Owner</label>
      <select id="owneruserid" name="owneruserid" required>
        <option value="" disabled selected>Select owner</option>
        {% for u in users %}
        <option value="{{ u['userid'] }}">{{ u['name'] }}</option>
        {% endfor %}
      </select>
    </div>

    <div style="display:flex; gap:12px; margin-top:8px;">
      <button type="submit" class="btn btn-primary">Save Asset</button>
      <a href="{{ url_for('assets') }}" class="btn btn-ghost">Cancel</a>
    </div>

  </form>
</div>
{% endblock %}
